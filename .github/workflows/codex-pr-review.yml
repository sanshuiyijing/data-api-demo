name: Codex PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Authenticate Codex CLI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export CODEX_HOME="$RUNNER_TEMP/.codex"
          mkdir -p "$CODEX_HOME"
          printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Fetch base branch
        run: |
          git fetch --no-tags --prune origin \
            +refs/heads/${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Run Codex review
        run: |
          export CODEX_HOME="$RUNNER_TEMP/.codex"
          export REVIEW_PATH="$RUNNER_TEMP/codex-review.md"
          codex --output-last-message "$REVIEW_PATH" review \
            --base "origin/${{ github.event.pull_request.base.ref }}" \
            "Review this pull request for correctness, regressions, security issues, and missing test coverage. Return concise Markdown with findings first. If there are no findings, say 'No findings.' and briefly mention any residual risk or verification gap."

      - name: Publish review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '<!-- codex-pr-review -->';
            const reviewPath = path.join(process.env.RUNNER_TEMP, 'codex-review.md');
            const reviewBody = fs.readFileSync(reviewPath, 'utf8').trim() || 'No findings.';
            const commentBody = [marker, '## Codex Review', '', reviewBody].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: commentBody,
            });