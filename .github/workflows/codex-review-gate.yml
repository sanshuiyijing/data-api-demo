name: Auto Approve Bot Thumbs Up

on:
  pull_request:
    types: [labeled, unlabeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  issues: read
  pull-requests: write
  statuses: write

concurrency:
  group: auto-approve-bot-thumbs-up-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Require GitHub App credentials
        env:
          GITHUB_APP_ID: ${{ secrets.APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [[ -z "$GITHUB_APP_ID" || -z "$GITHUB_APP_PRIVATE_KEY" ]]; then
            echo "::error::Repository variable APP_ID and secret APP_PRIVATE_KEY are required to mint a GitHub App installation token."
            exit 1
          fi

      - name: Generate GitHub App token
        id: approve-app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Approve PR when Codex bot leaves approval signal
        uses: actions/github-script@v7
        env:
          CODEX_BOT_LOGINS: chatgpt-codex-connector[bot]
          APPROVE_REACTIONS: '+1'
        with:
          github-token: ${{ steps.approve-app-token.outputs.token }}
          script: |
            const marker = '<!-- auto-approve-bot-thumbs-up -->';
            const statusContext = 'codex-review-gate';
            const { owner, repo } = context.repo;

            const pullNumber = context.payload.pull_request?.number;

            if (!pullNumber) {
              core.info('No pull request number found in event payload.');
              return;
            }

            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });

            if (pr.data.draft) {
              core.info('Pull request is draft. Skipping auto-approve.');
              return;
            }

            const headSha = pr.data.head?.sha;
            const labels = (pr.data.labels || [])
              .map((label) => (typeof label === 'string' ? label : label.name || ''))
              .map((label) => label.trim().toLowerCase())
              .filter(Boolean);

            const hasTaskLabel = labels.includes('task');
            const hasNoCtLabel = labels.includes('no-ct');
            const shouldUseCodexSignal = hasTaskLabel && hasNoCtLabel;

            const setGateStatus = async (state, description) => {
              if (!headSha) {
                core.info(`Skipping ${statusContext} status update because the PR head SHA is unavailable.`);
                return;
              }

              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: headSha,
                state,
                context: statusContext,
                description,
                target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              });

              core.info(`Set ${statusContext} to ${state}: ${description}`);
            };

            const botLogins = (process.env.CODEX_BOT_LOGINS || '')
              .split(',')
              .map((value) => value.trim().toLowerCase())
              .filter(Boolean);

            const reactionTriggers = (process.env.APPROVE_REACTIONS || '+1')
              .split(',')
              .map((value) => value.trim().toLowerCase())
              .filter(Boolean);

            const getPriorityBadge = (body) => {
              const firstNonEmptyLine = (body || '')
                .split(/\r?\n/)
                .map((line) => line.trim())
                .find(Boolean);

              if (!firstNonEmptyLine) {
                return null;
              }

              const badgeMatch = firstNonEmptyLine.match(/^\[?(P\d+)\]?\b/i);
              return badgeMatch ? badgeMatch[1].toUpperCase() : null;
            };

            const getLatestMessage = (issueComments, reviewComments, reviews) => {
              const messages = [
                ...issueComments.map((item) => ({
                  kind: 'issue-comment',
                  login: item.user?.login?.toLowerCase() || null,
                  body: item.body || '',
                  timestamp: item.updated_at || item.created_at || null,
                })),
                ...reviewComments.map((item) => ({
                  kind: 'review-comment',
                  login: item.user?.login?.toLowerCase() || null,
                  body: item.body || '',
                  timestamp: item.updated_at || item.created_at || null,
                })),
                ...reviews.map((item) => ({
                  kind: 'review',
                  login: item.user?.login?.toLowerCase() || null,
                  body: item.body || '',
                  timestamp: item.submitted_at || item.updated_at || item.created_at || null,
                })),
              ].filter((item) => item.timestamp);

              if (messages.length === 0) {
                return null;
              }

              messages.sort((left, right) =>
                new Date(right.timestamp).getTime() - new Date(left.timestamp).getTime()
              );

              return messages[0];
            };

            const getLatestReviewStatesByUser = (items) => {
              const latestReviewByUser = new Map();

              for (const item of items) {
                const login = item.user?.login?.toLowerCase();
                const timestamp = item.submitted_at || item.updated_at || item.created_at;

                if (!login || !timestamp) {
                  continue;
                }

                const current = latestReviewByUser.get(login);

                if (!current || new Date(timestamp).getTime() > new Date(current.timestamp).getTime()) {
                  latestReviewByUser.set(login, {
                    state: item.state,
                    body: item.body || '',
                    timestamp,
                  });
                }
              }

              return latestReviewByUser;
            };

            const [issueComments, reviewComments, reviews] = await Promise.all([
              github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullNumber,
                per_page: 100,
              }),
              github.paginate(github.rest.pulls.listReviewComments, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              }),
              github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              }),
            ]);

            const latestReviewsByUser = getLatestReviewStatesByUser(reviews);
            const hasCurrentApproval = Array.from(latestReviewsByUser.values()).some(
              (review) => review.state === 'APPROVED'
            );

            if (!shouldUseCodexSignal) {
              if (hasCurrentApproval) {
                await setGateStatus('success', 'PR already has an approval review.');
              } else {
                await setGateStatus('pending', 'Waiting for an approval review while task/no-ct labels are absent.');
              }

              return;
            }

            const reactionMatches = async (items, listReactions, buildParams = (item) => ({ comment_id: item.id })) => {
              for (const item of items) {
                for (const reactionTrigger of reactionTriggers) {
                  const reactions = await github.paginate(listReactions, {
                    owner,
                    repo,
                    ...buildParams(item),
                    content: reactionTrigger,
                    per_page: 100,
                    mediaType: {
                      previews: ['squirrel-girl'],
                    },
                  });

                  let matchedLogin = null;
                  const match = reactions.find((reaction) => {
                    const login = reaction.user?.login?.toLowerCase();
                    if (login && botLogins.includes(login) && reaction.content === reactionTrigger) {
                      matchedLogin = login;
                      return true;
                    }

                    return false;
                  });

                  if (match && matchedLogin) {
                    return {
                      source: 'reaction',
                      login: matchedLogin,
                      trigger: reactionTrigger,
                    };
                  }
                }
              }

              return null;
            };

            const reviewReactionMatches = async (items) => {
              for (const item of items) {
                for (const reactionTrigger of reactionTriggers) {
                  const reactions = await github.paginate(
                    github.rest.reactions.listForPullRequestReview,
                    {
                      owner,
                      repo,
                      pull_number: pullNumber,
                      review_id: item.id,
                      content: reactionTrigger,
                      per_page: 100,
                      mediaType: {
                        previews: ['squirrel-girl'],
                      },
                    }
                  );

                  let matchedLogin = null;
                  const match = reactions.find((reaction) => {
                    const login = reaction.user?.login?.toLowerCase();
                    if (login && botLogins.includes(login) && reaction.content === reactionTrigger) {
                      matchedLogin = login;
                      return true;
                    }

                    return false;
                  });

                  if (match && matchedLogin) {
                    return {
                      source: 'review-reaction',
                      login: matchedLogin,
                      trigger: reactionTrigger,
                    };
                  }
                }
              }

              return null;
            };

            const issueReactionMatches = async () => {
              for (const reactionTrigger of reactionTriggers) {
                const reactions = await github.paginate(github.rest.reactions.listForIssue, {
                  owner,
                  repo,
                  issue_number: pullNumber,
                  content: reactionTrigger,
                  per_page: 100,
                  mediaType: {
                    previews: ['squirrel-girl'],
                  },
                });

                let matchedLogin = null;
                const match = reactions.find((reaction) => {
                  const login = reaction.user?.login?.toLowerCase();
                  if (login && botLogins.includes(login) && reaction.content === reactionTrigger) {
                    matchedLogin = login;
                    return true;
                  }

                  return false;
                });

                if (match && matchedLogin) {
                  return {
                    source: 'issue-reaction',
                    login: matchedLogin,
                    trigger: reactionTrigger,
                  };
                }
              }

              return null;
            };

            const matchedReaction =
              (await issueReactionMatches()) ||
              (await reactionMatches(
                issueComments,
                github.rest.reactions.listForIssueComment
              )) ||
              (await reviewReactionMatches(reviews)) ||
              (await reactionMatches(
                reviewComments,
                github.rest.reactions.listForPullRequestReviewComment
              ));

            const latestMessage = getLatestMessage(issueComments, reviewComments, reviews);

            let matchedSource = matchedReaction
                ? { item: null, match: matchedReaction }
                : null;

            if (!matchedSource) {
              if (!latestMessage) {
                core.info('No comments or reviews found on the pull request.');
              } else if (!latestMessage.login || !botLogins.includes(latestMessage.login)) {
                core.info(`Latest message is from ${latestMessage.login || 'unknown'}, not a configured bot. Skipping auto-approve.`);
              } else if (getPriorityBadge(latestMessage.body) === 'P0') {
                core.info(`Latest bot message contains a P0 badge. Skipping auto-approve.`);
              } else {
                matchedSource = {
                  item: latestMessage,
                  match: {
                    source: latestMessage.kind,
                    login: latestMessage.login,
                    trigger: 'latest-bot-message-without-p0',
                  },
                };
              }
            }

            if (!matchedSource) {
              core.info(`Scanned ${issueComments.length} issue comments, ${reviewComments.length} review comments, and ${reviews.length} reviews for Codex approval signals.`);
              core.info('No matching Codex bot approval signal found.');

              if (hasCurrentApproval) {
                await setGateStatus('success', 'PR already has an approval review.');
              } else {
                await setGateStatus('pending', 'Waiting for a matching Codex bot approval signal.');
              }

              return;
            }

            const alreadyApproved = Array.from(latestReviewsByUser.values()).some(
              (review) =>
                review.state === 'APPROVED' &&
                review.body.includes(marker)
            );

            if (alreadyApproved) {
              core.info('PR already has the workflow approval.');
              await setGateStatus('success', 'PR already has the workflow approval.');
              return;
            }

            await github.rest.pulls.createReview({
              owner,
              repo,
              pull_number: pullNumber,
              event: 'APPROVE',
              body: `${marker}\nApproved because ${matchedSource.match.login} posted a matching ${matchedSource.match.source}: ${matchedSource.match.trigger}.`,
            });

            core.info(`Approved PR #${pullNumber} after ${matchedSource.match.login} posted a matching ${matchedSource.match.source}: ${matchedSource.match.trigger}.`);
            await setGateStatus('success', 'Approved after a matching Codex bot signal.');